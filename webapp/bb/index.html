<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>BB 페이지 선택</title>
  <style>
    body{margin:0;font-family: -apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f4efe6;color:#2f2618;padding:16px}
    .wrap{max-width:420px;margin:0 auto}
    h1{font-size:20px;margin:0 0 10px}
    p{color:#66543d;margin-top:0;font-size:13px}
    .card{background:#fff;border:1px solid rgba(120,90,40,.25);border-radius:14px;padding:12px;margin:10px 0}
    .btn{display:inline-block;padding:10px 12px;border-radius:11px;border:1px solid rgba(120,90,40,.28);margin:5px 4px 0 0;text-decoration:none;font-weight:700;color:#362a18;background:#fff}
    .btn.primary{background:#6e4b1e;color:#fff;border-color:#6e4b1e}
    .muted{color:#7b6444;font-size:12px;line-height:1.4}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>BB 미리보기 페이지</h1>
    <p class="muted">이전 UI와 새 시퀀스 UI가 뒤섞여 보여서 헷갈렸던 부분을 분리했어요. 아래에서 원하는 화면으로 바로 들어가세요.</p>
    <div class="card">
      <div class="muted">추천: 이전에 보던 UI</div>
      <a class="btn" href="./gameui.html">game-ui 기본</a>
    </div>
    <div class="card">
      <div class="muted">요청한 시퀀스 미리보기 (버리기→친구콜→플레잉)</div>
      <a class="btn primary" href="./bb-button.html">sequence preview</a>
      <a class="btn" href="./preview.html">same url preview</a>
    </div>
    <div class="card">
      <div class="muted">직접 링크</div>
      <a class="btn" href="./index.html?v=legacy">gameui(위)</a>
      <a class="btn" href="./bb-button.html?v=seq">시퀀스</a>
    </div>
  </div>
</body>
</html>
